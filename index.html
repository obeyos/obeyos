<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>גלגל משפחת בן יוסף</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background-color: #1A237E; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* מסך כניסה כחול עמוק */
        #welcome-screen { text-align: center; width: 100%; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(180deg, #1A237E 0%, #283593 100%); position: fixed; z-index: 100; }
        .welcome-emoji { font-size: 80px; margin-bottom: 10px; }
        
        /* תפריט משימות - גריד לבן נקי */
        #menu-screen { display: none; padding: 20px; width: 100%; max-width: 450px; text-align: center; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .card { background: white; border-radius: 20px; padding: 25px 10px; display: flex; flex-direction: column; align-items: center; cursor: pointer; border: none; box-shadow: 0 6px 20px rgba(0,0,0,0.2); transition: transform 0.2s; }
        .card:active { transform: scale(0.95); }
        .card-icon { font-size: 40px; margin-bottom: 10px; }
        .card-text { color: #1A237E; font-weight: bold; font-size: 18px; }

        /* הגלגל המעוצב */
        #wheel-screen { display: none; flex-direction: column; align-items: center; width: 100%; padding-top: 20px; }
        .wheel-container { position: relative; width: 320px; height: 320px; margin: 40px 0; }
        #canvas-wrapper { width: 100%; height: 100%; border: 8px solid #FFD700; border-radius: 50%; background: white; box-shadow: 0 0 30px rgba(0,0,0,0.4); overflow: hidden; }
        .pointer { width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; border-top: 40px solid #FFD700; position: absolute; top: -25px; left: 50%; transform: translateX(-50%); z-index: 20; filter: drop-shadow(0 3px 5px rgba(0,0,0,0.5)); }
        
        .btn-green { background: #00C853; color: white; border: none; padding: 18px 50px; font-size: 22px; font-weight: bold; border-radius: 40px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); margin-top: 20px; }
